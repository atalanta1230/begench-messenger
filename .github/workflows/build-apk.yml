name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      server_url:
        description: 'URL Deno туннеля (например: https://xxx.deno.net)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Update server URL if provided
        if: ${{ github.event.inputs.server_url != '' }}
        run: |
          sed -i "s|https://ЗАМЕНИ_НА_СВОЙ_URL.deno.net|${{ github.event.inputs.server_url }}|g" \
            android/app/src/main/java/com/begench/messenger/MainActivity.java

      - name: Setup Gradle
        run: |
          cd android
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: begench-messenger
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
